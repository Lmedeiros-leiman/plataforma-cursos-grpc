syntax = "proto3";

option csharp_namespace = "Server.Features.Albums";

package albums;

service AlbumCatalog {
  rpc SearchAlbums (SearchAlbumsRequest) returns (SearchAlbumsResponse);
  rpc GetAlbumById (GetAlbumByIdRequest) returns (GetAlbumByIdResponse);
  rpc CreateAlbum (CreateAlbumRequest) returns (CreateAlbumResponse);
  rpc UpdateAlbum (UpdateAlbumRequest) returns (UpdateAlbumResponse);
  rpc DeleteAlbum (DeleteAlbumRequest) returns (DeleteAlbumResponse);
}

message FilterValue {
  oneof value {
    int32 id = 1;
    string text = 2;
  }
}

message SearchAlbumsRequest {
  int32 cursor = 1;
  int32 page_size = 2;
  FilterValue author = 3;
  FilterValue band = 4;
  FilterValue category = 5;
}

message SearchAlbumsResponse {
  repeated AlbumItem albums = 1;
  int32 next_cursor = 2;
}

message GetAlbumByIdRequest {
  int32 album_id = 1;
}

message CreateAlbumRequest {
  string title = 1;
  int32 artist_id = 2;
}

message UpdateAlbumRequest {
  int32 album_id = 1;
  string title = 2;
  int32 artist_id = 3;
}

message GetAlbumByIdResponse {
  AlbumItem album = 1;
}

message CreateAlbumResponse {
  AlbumItem album = 1;
}

message UpdateAlbumResponse {
  AlbumItem album = 1;
}

message DeleteAlbumRequest {
  AlbumItem album = 1;
}

message DeleteAlbumResponse {
  int32 album_id = 1;
  string message = 2;
}

message AlbumItem {
  int32 album_id = 1;
  string title = 2;
  int32 artist_id = 3;
  string artist_name = 4;
  repeated TrackItem tracks = 5;
}

message TrackItem {
  int32 track_id = 1;
  string name = 2;
  int32 genre_id = 3;
  string genre_name = 4;
  string composer = 5;
  int32 milliseconds = 6;
  double unit_price = 7;
}
