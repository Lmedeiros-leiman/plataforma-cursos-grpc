syntax = "proto3";

option csharp_namespace = "Server.Features.Authentication.Admin";

package authentication.admin;

service AdminLogin {
  rpc SignIn (AdminSignInRequest) returns (AdminSignInReply);
}

message AdminSignInRequest {
  string credential = 1;
}

message AdminSignInReply {
  int32 employee_id = 1;
  string first_name = 2;
  string last_name = 3;
  string title = 4;
  string email = 5;
  string phone = 6;
  string fax = 7;
}
