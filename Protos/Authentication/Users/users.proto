syntax = "proto3";

option csharp_namespace = "Server.Features.Authentication.Users";

package authentication.users;

service UserCatalog {
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
  rpc GetUserById (GetUserByIdRequest) returns (GetUserByIdResponse);
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);
}

message ListUsersRequest {
  int32 cursor = 1;
  int32 page_size = 2;
  string query = 3;
}

message ListUsersResponse {
  repeated UserItem users = 1;
  int32 next_cursor = 2;
}

message GetUserByIdRequest {
  int32 customer_id = 1;
}

message CreateUserRequest {
  string first_name = 1;
  string last_name = 2;
  string company = 3;
  string address = 4;
  string city = 5;
  string state = 6;
  string country = 7;
  string postal_code = 8;
  string phone = 9;
  string fax = 10;
  string email = 11;
  int32 support_rep_id = 12;
}

message UpdateUserRequest {
  int32 customer_id = 1;
  string first_name = 2;
  string last_name = 3;
  string company = 4;
  string address = 5;
  string city = 6;
  string state = 7;
  string country = 8;
  string postal_code = 9;
  string phone = 10;
  string fax = 11;
  string email = 12;
  int32 support_rep_id = 13;
}

message GetUserByIdResponse {
  UserItem user = 1;
}

message CreateUserResponse {
  UserItem user = 1;
}

message UpdateUserResponse {
  UserItem user = 1;
}

message DeleteUserRequest {
  UserItem user = 1;
}

message DeleteUserResponse {
  int32 customer_id = 1;
  string message = 2;
}

message UserItem {
  int32 customer_id = 1;
  string first_name = 2;
  string last_name = 3;
  string company = 4;
  string address = 5;
  string city = 6;
  string state = 7;
  string country = 8;
  string postal_code = 9;
  string phone = 10;
  string fax = 11;
  string email = 12;
  int32 support_rep_id = 13;
}
