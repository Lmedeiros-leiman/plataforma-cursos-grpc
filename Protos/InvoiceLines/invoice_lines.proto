syntax = "proto3";

option csharp_namespace = "Server.Features.InvoiceLines";

package invoice_lines;

service InvoiceLineCatalog {
  rpc ListInvoiceLines (ListInvoiceLinesRequest) returns (ListInvoiceLinesResponse);
  rpc GetInvoiceLineById (GetInvoiceLineByIdRequest) returns (GetInvoiceLineByIdResponse);
  rpc CreateInvoiceLine (CreateInvoiceLineRequest) returns (CreateInvoiceLineResponse);
  rpc UpdateInvoiceLine (UpdateInvoiceLineRequest) returns (UpdateInvoiceLineResponse);
  rpc DeleteInvoiceLine (DeleteInvoiceLineRequest) returns (DeleteInvoiceLineResponse);
}

message ListInvoiceLinesRequest {
  int32 cursor = 1;
  int32 page_size = 2;
  int32 invoice_id = 3;
  int32 track_id = 4;
}

message ListInvoiceLinesResponse {
  repeated InvoiceLineItem invoice_lines = 1;
  int32 next_cursor = 2;
}

message GetInvoiceLineByIdRequest {
  int32 invoice_line_id = 1;
}

message CreateInvoiceLineRequest {
  int32 invoice_id = 1;
  int32 track_id = 2;
  double unit_price = 3;
  int32 quantity = 4;
}

message UpdateInvoiceLineRequest {
  int32 invoice_line_id = 1;
  int32 invoice_id = 2;
  int32 track_id = 3;
  double unit_price = 4;
  int32 quantity = 5;
}

message GetInvoiceLineByIdResponse {
  InvoiceLineItem invoice_line = 1;
}

message CreateInvoiceLineResponse {
  InvoiceLineItem invoice_line = 1;
}

message UpdateInvoiceLineResponse {
  InvoiceLineItem invoice_line = 1;
}

message DeleteInvoiceLineRequest {
  InvoiceLineItem invoice_line = 1;
}

message DeleteInvoiceLineResponse {
  int32 invoice_line_id = 1;
  string message = 2;
}

message InvoiceLineItem {
  int32 invoice_line_id = 1;
  int32 invoice_id = 2;
  int32 customer_id = 3;
  string customer_name = 4;
  int32 track_id = 5;
  string track_name = 6;
  double unit_price = 7;
  int32 quantity = 8;
}
