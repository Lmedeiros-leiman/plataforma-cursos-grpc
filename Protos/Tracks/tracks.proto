syntax = "proto3";

option csharp_namespace = "Server.Features.Tracks";

package tracks;

service TrackCatalog {
  rpc ListTracks (ListTracksRequest) returns (ListTracksResponse);
  rpc GetTrackById (GetTrackByIdRequest) returns (GetTrackByIdResponse);
  rpc CreateTrack (CreateTrackRequest) returns (CreateTrackResponse);
  rpc UpdateTrack (UpdateTrackRequest) returns (UpdateTrackResponse);
  rpc DeleteTrack (DeleteTrackRequest) returns (DeleteTrackResponse);
}

message ListTracksRequest {
  int32 cursor = 1;
  int32 page_size = 2;
  string name = 3;
  int32 album_id = 4;
  int32 media_type_id = 5;
  int32 genre_id = 6;
}

message ListTracksResponse {
  repeated TrackItem tracks = 1;
  int32 next_cursor = 2;
}

message GetTrackByIdRequest {
  int32 track_id = 1;
}

message CreateTrackRequest {
  string name = 1;
  int32 album_id = 2;
  int32 media_type_id = 3;
  int32 genre_id = 4;
  string composer = 5;
  int32 miliseconds = 6;
  int32 bytes = 7;
  double unit_price = 8;
}

message UpdateTrackRequest {
  int32 track_id = 1;
  string name = 2;
  int32 album_id = 3;
  int32 media_type_id = 4;
  int32 genre_id = 5;
  string composer = 6;
  int32 miliseconds = 7;
  int32 bytes = 8;
  double unit_price = 9;
}

message GetTrackByIdResponse {
  TrackItem track = 1;
}

message CreateTrackResponse {
  TrackItem track = 1;
}

message UpdateTrackResponse {
  TrackItem track = 1;
}

message DeleteTrackRequest {
  TrackItem track = 1;
}

message DeleteTrackResponse {
  int32 track_id = 1;
  string message = 2;
}

message TrackItem {
  int32 track_id = 1;
  string name = 2;
  int32 album_id = 3;
  string album_title = 4;
  int32 media_type_id = 5;
  string media_type_name = 6;
  int32 genre_id = 7;
  string genre_name = 8;
  string composer = 9;
  int32 miliseconds = 10;
  int32 bytes = 11;
  double unit_price = 12;
}
